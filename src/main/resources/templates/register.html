<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Mjengo System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' },
                        accent: { 500: '#f97316', 600: '#ea580c' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .login-bg {
            background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 50%, #0ea5e9 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="login-bg h-full flex items-center justify-center p-4 relative">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-32 -right-32 w-64 h-64 bg-white/5 rounded-full"></div>
        <div class="absolute -bottom-16 -left-16 w-48 h-48 bg-white/5 rounded-full"></div>
    </div>

    <div class="w-full max-w-sm relative z-10">
        <!-- Logo -->
        <div class="text-center mb-5">
            <div class="inline-flex items-center gap-2 mb-2">
                <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm border border-white/20">
                    <i class="fa-solid fa-building text-white text-lg"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Mjengo<span
                        class="text-accent-500">.</span></h1>
            </div>
            <p class="text-white/60 text-xs">Create your construction management account</p>
        </div>

        <!-- Register Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-6 border border-white/20">
            <h2 class="text-lg font-bold text-gray-800 mb-0.5">Create Account</h2>
            <p class="text-xs text-gray-500 mb-4">Fill in your details and select your role</p>

            <div th:if="${error}"
                class="bg-red-50 border border-red-200 text-red-700 text-xs px-3 py-2 rounded-lg mb-4 flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}">Error</span>
            </div>

            <form action="/register" method="POST" class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Full Name</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i
                                class="fa-regular fa-user text-gray-400 text-xs"></i></div>
                        <input type="text" name="fullName" required placeholder="e.g. John Doe"
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i
                                class="fa-regular fa-envelope text-gray-400 text-xs"></i></div>
                        <input type="email" name="email" required placeholder="you@company.com"
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i
                                class="fa-solid fa-lock text-gray-400 text-xs"></i></div>
                        <input type="password" name="password" required placeholder="Min. 6 characters"
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                    </div>
                </div>

                <!-- Role as Dropdown -->
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Your Role</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i
                                class="fa-solid fa-helmet-safety text-gray-400 text-xs"></i></div>
                        <select name="role"
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="PROJECT_MANAGER">Project Manager</option>
                            <option value="ENGINEER">Site Engineer</option>
                            <option value="CONTRACTOR">Contractor</option>
                            <option value="CLIENT">Client / Property Owner</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none"><i
                                class="fa-solid fa-chevron-down text-gray-400 text-[10px]"></i></div>
                    </div>
                </div>

                <button type="submit"
                    class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 rounded-lg transition-colors shadow-lg shadow-brand-500/30 flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <p class="text-center text-xs text-gray-500 mt-4">Already have an account? <a href="/login"
                    class="text-brand-600 hover:text-brand-800 font-semibold">Sign in</a></p>
            <p class="text-center text-[11px] text-gray-400 mt-2">Admin account is provisioned by the system.</p>
        </div>
        <p class="text-center text-white/40 text-[10px] mt-4">&copy; 2026 Mjengo Systems. COSC 381 Project.</p>
    </div>
</body>

</html>
