<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head(${title})}"></head>

<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="flex-1 flex flex-col relative w-full h-full">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <main class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-900"><i
                        class="fa-solid fa-calendar-check text-brand-500 mr-2"></i>Book a consultation</h1>
                <p class="text-sm text-gray-500 mt-1">Request time with an engineer, project manager, administrator, or
                    site contractor. Your team is notified immediately.</p>
            </div>

            <div th:if="${success}"
                class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-4 py-3 rounded-lg">
                <span th:text="${success}"></span>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
                    <h2 class="font-bold text-gray-900 mb-4">New request</h2>
                    <form action="/consultations/book" method="POST" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 mb-1">Consult with</label>
                            <select name="consulteeRole" required
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm bg-gray-50">
                                <option value="ENGINEER">Engineer (technical / site)</option>
                                <option value="PROJECT_MANAGER">Project Manager</option>
                                <option value="ADMIN">Administrator</option>
                                <option value="CONTRACTOR">Contractor (site execution)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 mb-1">Related project (optional)</label>
                            <select name="projectId"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm bg-gray-50">
                                <option value="0">— General / not project-specific —</option>
                                <option th:each="p : ${projects}" th:value="${p.id}"
                                    th:text="${p.name} + ' — ' + ${p.location}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 mb-1">Topic *</label>
                            <input type="text" name="topic" required placeholder="e.g. Review BoQ assumptions"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 mb-1">Preferred date / time *</label>
                            <input type="text" name="preferredSlot" required
                                placeholder="e.g. Tue 10:00–11:00 or 2026-04-15 afternoon"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-700 mb-1">Notes</label>
                            <textarea name="notes" rows="3" placeholder="Context, meeting link preference, phone…"
                                class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm"></textarea>
                        </div>
                        <button type="submit"
                            class="w-full bg-brand-600 hover:bg-brand-700 text-white rounded-lg py-2.5 text-sm font-medium">Submit
                            request</button>
                    </form>
                </div>

                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6">
                    <h2 class="font-bold text-gray-900 mb-4">Your requests</h2>
                    <div th:if="${myRequests == null or myRequests.isEmpty()}" class="text-sm text-gray-500">No requests
                        yet.</div>
                    <div class="space-y-3 max-h-[480px] overflow-y-auto">
                        <div th:each="r : ${myRequests}" class="border border-gray-100 rounded-lg p-4 text-sm">
                            <div class="flex justify-between gap-2">
                                <span class="font-bold text-gray-900" th:text="${r.topic}"></span>
                                <span class="text-[10px] uppercase font-bold text-brand-600"
                                    th:text="${r.consulteeRole}"></span>
                            </div>
                            <p class="text-xs text-gray-500 mt-1" th:text="${r.createdAt}"></p>
                            <p class="text-xs text-gray-600 mt-2"><span class="font-semibold">When:</span> <span
                                    th:text="${r.preferredSlot}"></span></p>
                            <p th:if="${r.projectName != null and !r.projectName.isEmpty()}"
                                class="text-xs text-gray-600"><span class="font-semibold">Project:</span> <span
                                    th:text="${r.projectName}"></span></p>
                            <p th:if="${r.notes != null and !r.notes.isEmpty()}" class="text-xs text-gray-600 mt-1"
                                th:text="${r.notes}"></p>
                            <p class="text-[10px] text-emerald-700 font-bold mt-2" th:text="${r.status}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
