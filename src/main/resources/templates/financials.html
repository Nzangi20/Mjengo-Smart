<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head(${title})}"></head>

<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="flex-1 flex flex-col relative w-full h-full">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <main class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div th:if="${success}"
                class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-4 py-3 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> <span th:text="${success}">OK</span></div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${title}">Financial Management</h1>
                    <p class="text-sm text-gray-500 mt-1">Track payments, expenses, and project cost allocation.</p>
                </div>
            </div>
            <!-- Financial KPIs -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                    <p class="text-sm text-gray-500">Total Transactions</p>
                    <h3 class="text-2xl font-black text-gray-900"
                        th:text="'KES ' + ${#numbers.formatDecimal(totalAmount, 1, 0)}">0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                    <p class="text-sm text-gray-500">Cleared</p>
                    <h3 class="text-2xl font-black text-emerald-600"
                        th:text="'KES ' + ${#numbers.formatDecimal(clearedAmount, 1, 0)}">0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                    <p class="text-sm text-gray-500">Pending Approval</p>
                    <h3 class="text-2xl font-black text-amber-600"
                        th:text="'KES ' + ${#numbers.formatDecimal(pendingAmount, 1, 0)}">0</h3>
                </div>
            </div>
            <!-- Record Transaction Form -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-8">
                <h2 class="font-bold text-gray-900 mb-4"><i class="fa-solid fa-wallet text-brand-500 mr-2"></i> Record
                    New Transaction</h2>
                <form action="/transactions/add" method="POST"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" name="payee" placeholder="Payee / Vendor" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <select name="category"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option>Materials</option>
                        <option>Labor</option>
                        <option>Permits</option>
                        <option>Equipment</option>
                        <option>Consulting</option>
                        <option>Utilities</option>
                    </select>
                    <input type="number" name="amount" placeholder="Amount (KES)" required step="1000"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <select name="project"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option th:each="p : ${projects}" th:value="${p.name}" th:text="${p.name}"></option>
                    </select>
                    <input type="date" name="date" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <button type="submit"
                        class="bg-brand-600 hover:bg-brand-700 text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors"><i
                            class="fa-solid fa-plus mr-1"></i> Record Transaction</button>
                </form>
            </div>
            <!-- Transactions Table -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="text-xs uppercase text-gray-500 border-b border-gray-200 bg-gray-50">
                        <tr>
                            <th class="px-6 py-3">TXN ID</th>
                            <th class="px-6 py-3">Date</th>
                            <th class="px-6 py-3">Payee</th>
                            <th class="px-6 py-3">Category</th>
                            <th class="px-6 py-3">Amount</th>
                            <th class="px-6 py-3">Project</th>
                            <th class="px-6 py-3 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100">
                        <tr th:each="t : ${transactions}" class="hover:bg-gray-50">
                            <td class="px-6 py-3 font-mono text-brand-600 text-xs font-bold"
                                th:text="${t.transactionId}"></td>
                            <td class="px-6 py-3 text-gray-500 text-xs" th:text="${t.date}"></td>
                            <td class="px-6 py-3 font-medium text-gray-900" th:text="${t.payee}"></td>
                            <td class="px-6 py-3"><span
                                    class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded font-bold"
                                    th:text="${t.category}"></span></td>
                            <td class="px-6 py-3 font-bold text-gray-900"
                                th:text="'KES ' + ${#numbers.formatDecimal(t.amount, 1, 0)}"></td>
                            <td class="px-6 py-3 text-gray-600 text-xs" th:text="${t.project}"></td>
                            <td class="px-6 py-3 text-center">
                                <span th:if="${t.status == 'CLEARED'}"
                                    class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded font-bold">Cleared</span>
                                <span th:if="${t.status == 'PENDING'}"
                                    class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded font-bold">Pending</span>
                                <span th:if="${t.status == 'REJECTED'}"
                                    class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded font-bold">Rejected</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
