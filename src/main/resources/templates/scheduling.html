<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head(${title})}"></head>

<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="flex-1 flex flex-col relative w-full h-full">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <main class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div th:if="${success}"
                class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-4 py-3 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> <span th:text="${success}">Success</span>
            </div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${title}">Project Scheduling</h1>
                    <p class="text-sm text-gray-500 mt-1">Assign, track, and prioritize all engineering and construction
                        tasks.</p>
                </div>
            </div>
            <!-- Add Task Form -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-8">
                <h2 class="font-bold text-gray-900 mb-4"><i class="fa-solid fa-clipboard-list text-accent-500 mr-2"></i>
                    Create New Task</h2>
                <form action="/tasks/add" method="POST" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" name="title" placeholder="Task Title" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50 lg:col-span-2">
                    <input type="text" name="assignedTo" placeholder="Assigned To (Person)" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <textarea name="description" placeholder="Task description..." rows="2"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50 lg:col-span-3"></textarea>
                    <select name="project"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option th:each="p : ${projects}" th:value="${p.name}" th:text="${p.name}"></option>
                    </select>
                    <select name="category"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option>Structural</option>
                        <option>Electrical</option>
                        <option>Plumbing</option>
                        <option>Quality</option>
                        <option>Design</option>
                        <option>Safety</option>
                        <option>Procurement</option>
                        <option>Admin</option>
                    </select>
                    <select name="priority"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option value="HIGH">High</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="LOW">Low</option>
                    </select>
                    <input type="date" name="dueDate" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <button type="submit"
                        class="bg-brand-600 hover:bg-brand-700 text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors lg:col-span-2"><i
                            class="fa-solid fa-plus mr-1"></i> Create Task</button>
                </form>
            </div>
            <!-- Task Table -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="text-xs uppercase text-gray-500 border-b border-gray-200 bg-gray-50">
                        <tr>
                            <th class="px-6 py-3">Task</th>
                            <th class="px-6 py-3">Assigned To</th>
                            <th class="px-6 py-3">Project</th>
                            <th class="px-6 py-3">Category</th>
                            <th class="px-6 py-3">Due Date</th>
                            <th class="px-6 py-3 text-center">Status</th>
                            <th class="px-6 py-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100">
                        <th:block th:each="t : ${tasks}">
                        <tr class="hover:bg-gray-50"
                            th:classappend="${t.status == 'OVERDUE' ? 'bg-red-50/30' : ''}">
                            <td class="px-6 py-3">
                                <p class="font-medium text-gray-900" th:text="${t.title}"></p><span
                                    class="text-[10px] text-gray-400" th:text="${t.priority}"></span>
                            </td>
                            <td class="px-6 py-3 text-gray-600" th:text="${t.assignedTo}"></td>
                            <td class="px-6 py-3 text-gray-600" th:text="${t.project}"></td>
                            <td class="px-6 py-3"><span
                                    class="bg-gray-100 text-gray-600 text-[10px] px-2 py-0.5 rounded font-bold"
                                    th:text="${t.category}"></span></td>
                            <td class="px-6 py-3 text-gray-500 font-mono text-xs" th:text="${t.dueDate}"></td>
                            <td class="px-6 py-3 text-center">
                                <span th:if="${t.status == 'OVERDUE'}"
                                    class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded font-bold">Overdue</span>
                                <span th:if="${t.status == 'TODAY'}"
                                    class="bg-accent-100 text-accent-700 text-[10px] px-2 py-0.5 rounded font-bold">Today</span>
                                <span th:if="${t.status == 'UPCOMING'}"
                                    class="bg-blue-100 text-brand-700 text-[10px] px-2 py-0.5 rounded font-bold">Upcoming</span>
                                <span th:if="${t.status == 'DONE'}"
                                    class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded font-bold">Done</span>
                            </td>
                            <td class="px-6 py-3 text-center flex gap-2 justify-center">
                                <form th:if="${t.status != 'DONE'}" action="/tasks/done" method="POST"
                                    style="display:inline"><input type="hidden" name="id" th:value="${t.id}"><button
                                        type="submit" class="text-emerald-500 hover:text-emerald-700 text-xs"
                                        title="Mark Done"><i class="fa-solid fa-check"></i></button></form>
                                <form action="/tasks/delete" method="POST" style="display:inline"><input type="hidden"
                                        name="id" th:value="${t.id}"><button type="submit"
                                        class="text-red-500 hover:text-red-700 text-xs" title="Delete"><i
                                            class="fa-solid fa-trash"></i></button></form>
                            </td>
                        </tr>
                        <tr class="bg-slate-50/80 border-b border-gray-100">
                            <td colspan="7" class="px-6 py-3">
                                <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">Comments</p>
                                <div class="space-y-2 mb-3 max-h-32 overflow-y-auto">
                                    <div th:each="c : ${taskComments.get(t.id)}"
                                        class="text-xs bg-white border border-gray-100 rounded px-3 py-2">
                                        <span class="font-semibold text-gray-800" th:text="${c.authorName}"></span>
                                        <span class="text-gray-400" th:text="${c.createdAt}"></span>
                                        <p class="text-gray-600 mt-1" th:text="${c.body}"></p>
                                    </div>
                                </div>
                                <form action="/collaboration/comments/add" method="POST" class="flex gap-2 flex-wrap">
                                    <input type="hidden" name="targetKey" th:value="${'TASK:' + t.id}">
                                    <input type="hidden" name="returnPath" value="/scheduling">
                                    <input type="text" name="body" placeholder="Add a comment..." required
                                        class="flex-1 min-w-[200px] border border-gray-200 rounded-lg px-3 py-1.5 text-xs">
                                    <button type="submit" class="text-xs bg-brand-600 text-white px-3 py-1.5 rounded-lg">
                                        Post</button>
                                </form>
                            </td>
                        </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
