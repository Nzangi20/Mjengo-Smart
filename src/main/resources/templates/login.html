<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mjengo System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 900: '#0c4a6e' },
                        accent: { 500: '#f97316', 600: '#ea580c' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .login-bg {
            background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 50%, #0ea5e9 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
        }
    </style>
</head>

<body class="login-bg h-full flex items-center justify-center p-4 relative">
    <!-- Background circles -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-32 -right-32 w-64 h-64 bg-white/5 rounded-full"></div>
        <div class="absolute -bottom-16 -left-16 w-48 h-48 bg-white/5 rounded-full"></div>
        <div class="absolute top-1/3 left-1/4 w-24 h-24 bg-accent-500/10 rounded-full"></div>
    </div>

    <div class="w-full max-w-sm relative z-10">
        <!-- Logo -->
        <div class="text-center mb-5">
            <div class="inline-flex items-center gap-2 mb-2">
                <div class="bg-white/20 p-2 rounded-lg backdrop-blur-sm border border-white/20">
                    <i class="fa-solid fa-building text-white text-lg"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-white tracking-tight">Mjengo<span
                        class="text-accent-500">.</span></h1>
            </div>
            <p class="text-white/60 text-xs">Global Construction Intelligence System</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl shadow-2xl p-6 border border-white/20">
            <h2 class="text-lg font-bold text-gray-800 mb-0.5">Welcome Back</h2>
            <p class="text-xs text-gray-500 mb-4">Sign in to your project dashboard</p>

            <div th:if="${error}"
                class="bg-red-50 border border-red-200 text-red-700 text-xs px-3 py-2 rounded-lg mb-4 flex items-center gap-2">
                <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}">Error</span>
            </div>

            <form action="/login" method="POST" class="space-y-3.5">
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i
                                class="fa-regular fa-envelope text-gray-400 text-xs"></i></div>
                        <input type="email" name="email" required placeholder="you@company.com"
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i
                                class="fa-solid fa-lock text-gray-400 text-xs"></i></div>
                        <input type="password" name="password" required placeholder="••••••••"
                            class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all">
                    </div>
                </div>
                <div class="flex justify-between items-center text-xs">
                    <label class="flex items-center gap-1.5 text-gray-600 cursor-pointer">
                        <input type="checkbox"
                            class="rounded border-gray-300 text-brand-600 focus:ring-brand-500 h-3.5 w-3.5"> Remember me
                    </label>
                    <a href="#" class="text-brand-600 hover:text-brand-800 font-medium">Forgot password?</a>
                </div>
                <button type="submit"
                    class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 rounded-lg transition-colors shadow-lg shadow-brand-500/30 flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <!-- Trust Indicators -->
            <div class="mt-4 flex items-center justify-center gap-5 text-gray-400 text-[10px]">
                <span class="flex items-center gap-1"><i class="fa-solid fa-lock text-emerald-500"></i> Encrypted</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-shield-halved text-brand-500"></i>
                    Secure</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-building text-accent-500"></i> ISO
                    27001</span>
            </div>

            <p class="text-center text-xs text-gray-500 mt-4">New to Mjengo? <a href="/register"
                    class="text-brand-600 hover:text-brand-800 font-semibold">Create an account</a></p>
        </div>
        <p class="text-center text-white/40 text-[10px] mt-4">&copy; 2026 Mjengo Systems. COSC 381 Project.</p>
    </div>
</body>

</html>
