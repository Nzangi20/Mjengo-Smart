<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head(${title})}"></head>

<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="flex-1 flex flex-col relative w-full h-full">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <main class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div th:if="${success}"
                class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-4 py-3 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> <span th:text="${success}">Success</span>
            </div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${title}">Materials & Inventory</h1>
                    <p class="text-sm text-gray-500 mt-1">Track material stock levels, suppliers, and reorder alerts.
                    </p>
                </div>
            </div>
            <!-- Add Material Form -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-8">
                <h2 class="font-bold text-gray-900 mb-4"><i class="fa-solid fa-boxes-stacked text-brand-500 mr-2"></i>
                    Add New Material</h2>
                <form action="/materials/add" method="POST"
                    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" name="name" placeholder="Material Name" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <select name="unit"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option value="bags">Bags</option>
                        <option value="pcs">Pieces</option>
                        <option value="cubic_m">Cubic Metres</option>
                        <option value="kg">Kilograms</option>
                        <option value="sqm">Square Metres</option>
                        <option value="buckets">Buckets</option>
                        <option value="sheets">Sheets</option>
                    </select>
                    <input type="number" name="currentStock" placeholder="Current Stock" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <input type="number" name="maxStock" placeholder="Max Capacity" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <input type="number" name="unitPrice" placeholder="Unit Price (KES)" required step="10"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <input type="text" name="supplier" placeholder="Supplier Name" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <button type="submit"
                        class="bg-brand-600 hover:bg-brand-700 text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors lg:col-span-3"><i
                            class="fa-solid fa-plus mr-1"></i> Add Material</button>
                </form>
            </div>
            <!-- Inventory Table -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="text-xs uppercase text-gray-500 border-b border-gray-200 bg-gray-50">
                        <tr>
                            <th class="px-6 py-3">Material</th>
                            <th class="px-6 py-3">Unit</th>
                            <th class="px-6 py-3">Stock</th>
                            <th class="px-6 py-3">Capacity</th>
                            <th class="px-6 py-3">Unit Price</th>
                            <th class="px-6 py-3">Supplier</th>
                            <th class="px-6 py-3 text-center">Status</th>
                            <th class="px-6 py-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100">
                        <tr th:each="m : ${materials}" class="hover:bg-gray-50">
                            <td class="px-6 py-3 font-medium text-gray-900" th:text="${m.name}"></td>
                            <td class="px-6 py-3 text-gray-600" th:text="${m.unit}"></td>
                            <td class="px-6 py-3">
                                <span th:text="${m.currentStock}" class="font-bold"></span>
                                <div class="w-20 bg-gray-100 rounded-full h-1.5 mt-1">
                                    <div class="rounded-full h-1.5"
                                        th:classappend="${m.status == 'CRITICAL' ? 'bg-red-500' : (m.status == 'LOW' ? 'bg-amber-500' : 'bg-emerald-500')}"
                                        th:style="'width:' + ${(m.currentStock * 100 / m.maxStock)} + '%'"></div>
                                </div>
                            </td>
                            <td class="px-6 py-3 text-gray-500" th:text="${m.maxStock}"></td>
                            <td class="px-6 py-3 font-medium"
                                th:text="'KES ' + ${#numbers.formatDecimal(m.unitPrice, 1, 0)}"></td>
                            <td class="px-6 py-3 text-gray-600" th:text="${m.supplier}"></td>
                            <td class="px-6 py-3 text-center">
                                <span th:if="${m.status == 'OK'}"
                                    class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded font-bold">OK</span>
                                <span th:if="${m.status == 'LOW'}"
                                    class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded font-bold">Low</span>
                                <span th:if="${m.status == 'CRITICAL'}"
                                    class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded font-bold">Critical</span>
                            </td>
                            <td class="px-6 py-3 text-center">
                                <form action="/materials/delete" method="POST" style="display:inline"><input
                                        type="hidden" name="id" th:value="${m.id}"><button type="submit"
                                        class="text-red-500 hover:text-red-700 text-xs"><i
                                            class="fa-solid fa-trash"></i></button></form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
