<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/base :: head(${title})}"></head>

<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="flex-1 flex flex-col relative w-full h-full">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
        <main class="flex-1 overflow-y-auto p-6 lg:p-8">
            <div th:if="${success}"
                class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm px-4 py-3 rounded-lg flex items-center gap-2">
                <i class="fa-solid fa-circle-check"></i> <span th:text="${success}">Success</span>
            </div>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${title}">Workforce Management</h1>
                    <p class="text-sm text-gray-500 mt-1">Track attendance, trades, and crew assignments.</p>
                </div>
            </div>
            <!-- KPI Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                    <p class="text-sm text-gray-500">Total Workers</p>
                    <h3 class="text-3xl font-black text-gray-900" th:text="${workers.size()}">0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                    <p class="text-sm text-gray-500">Present Today</p>
                    <h3 class="text-3xl font-black text-emerald-600" th:text="${presentCount}">0</h3>
                </div>
                <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm text-center">
                    <p class="text-sm text-gray-500">Absent</p>
                    <h3 class="text-3xl font-black text-red-600" th:text="${absentCount}">0</h3>
                </div>
            </div>
            <!-- Add Worker Form -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-6 mb-8">
                <h2 class="font-bold text-gray-900 mb-4"><i class="fa-solid fa-user-plus text-brand-500 mr-2"></i> Add
                    New Worker</h2>
                <form action="/workers/add" method="POST" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <input type="text" name="name" placeholder="Full Name" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <select name="trade"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option>Mason</option>
                        <option>Electrician</option>
                        <option>Plumber</option>
                        <option>Welder</option>
                        <option>Carpenter</option>
                        <option>Labourer</option>
                        <option>Crane Operator</option>
                        <option>Surveyor</option>
                    </select>
                    <input type="text" name="phone" placeholder="Phone (0722-XXX-XXX)" required
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <select name="assignedProject"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                        <option th:each="p : ${projects}" th:value="${p.name}" th:text="${p.name}"></option>
                    </select>
                    <input type="number" name="dailyRate" placeholder="Daily Rate (KES)" required step="100"
                        class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-brand-500 outline-none bg-gray-50">
                    <button type="submit"
                        class="bg-brand-600 hover:bg-brand-700 text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors"><i
                            class="fa-solid fa-plus mr-1"></i> Add Worker</button>
                </form>
            </div>
            <!-- Worker Table -->
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <table class="w-full text-left">
                    <thead class="text-xs uppercase text-gray-500 border-b border-gray-200 bg-gray-50">
                        <tr>
                            <th class="px-6 py-3">Name</th>
                            <th class="px-6 py-3">Trade</th>
                            <th class="px-6 py-3">Phone</th>
                            <th class="px-6 py-3">Project</th>
                            <th class="px-6 py-3">Daily Rate</th>
                            <th class="px-6 py-3 text-center">Status</th>
                            <th class="px-6 py-3 text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-gray-100">
                        <tr th:each="w : ${workers}" class="hover:bg-gray-50">
                            <td class="px-6 py-3 font-medium text-gray-900" th:text="${w.name}"></td>
                            <td class="px-6 py-3 text-gray-600" th:text="${w.trade}"></td>
                            <td class="px-6 py-3 text-gray-500 font-mono text-xs" th:text="${w.phone}"></td>
                            <td class="px-6 py-3 text-gray-600" th:text="${w.assignedProject}"></td>
                            <td class="px-6 py-3 font-medium"
                                th:text="'KES ' + ${#numbers.formatDecimal(w.dailyRate, 1, 0)}"></td>
                            <td class="px-6 py-3 text-center">
                                <span th:if="${w.status == 'PRESENT'}"
                                    class="bg-emerald-100 text-emerald-700 text-[10px] px-2 py-0.5 rounded font-bold">Present</span>
                                <span th:if="${w.status == 'ABSENT'}"
                                    class="bg-red-100 text-red-700 text-[10px] px-2 py-0.5 rounded font-bold">Absent</span>
                                <span th:if="${w.status == 'LATE'}"
                                    class="bg-amber-100 text-amber-700 text-[10px] px-2 py-0.5 rounded font-bold">Late</span>
                                <span th:if="${w.status == 'ON_LEAVE'}"
                                    class="bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded font-bold">On
                                    Leave</span>
                            </td>
                            <td class="px-6 py-3 text-center">
                                <form action="/workers/delete" method="POST" style="display:inline">
                                    <input type="hidden" name="id" th:value="${w.id}">
                                    <button type="submit" class="text-red-500 hover:text-red-700 text-xs"><i
                                            class="fa-solid fa-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
